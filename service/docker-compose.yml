version: "3.9"

services:
  akshare-service:
    build:
      context: ..          # 以项目根目录为构建上下文
      dockerfile: service/Dockerfile
    image: akshare-stock-service:latest
    container_name: akshare-stock-service
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - AKSHARE_PROXY_URL=http://umwhniat-rotate:eudczfs5mkzt@p.webshare.io:80/
      - AKSHARE_PROXY_API=https://share.proxy.qg.net/get?key=KY5JZ4X2
      - AKSHARE_PROXY_AUTH_KEY=KY5JZ4X2
      - AKSHARE_PROXY_AUTH_PWD=5C2D184F943D
      - AKSHARE_PROXY_STRICT=1
      - AKSHARE_PROXY_LOG=1
      - AKSHARE_PROXY_FETCH_TIMEOUT=8
      - AKSHARE_PROXY_FETCH_RETRIES=3
      - AKSHARE_PROXY_FETCH_BACKOFF_MS=300
      - AKSHARE_API_RETRIES=3
      - AKSHARE_API_BACKOFF_MS=400
      - AKSHARE_SYMBOL_CACHE_BACKEND=redis
      - AKSHARE_REDIS_URL=redis://host.docker.internal:6379/0
      - "AKSHARE_REDIS_PREFIX=akshare:symbol_cache:"
      - AKSHARE_REDIS_SOCKET_TIMEOUT_SEC=1.5
      - AKSHARE_SYMBOL_CACHE_PRELOAD=0
      - AKSHARE_SYMBOL_CACHE_TTL_SEC=86400
      - AKSHARE_SYMBOL_CACHE_REFRESH_SEC=21600
      - AKSHARE_FINNHUB_API_KEY=d6rrnuhr01qrri55a5i0d6rrnuhr01qrri55a5ig
      - AKSHARE_FINNHUB_MIN_INTERVAL_SEC=1.2
      - AKSHARE_FINNHUB_DAILY_BUDGET=800
      - AKSHARE_FINNHUB_SEARCH_CACHE_TTL_SEC=86400
      - AKSHARE_FINNHUB_QUOTE_CACHE_TTL_SEC=7200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
