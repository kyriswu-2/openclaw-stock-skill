version: "3.9"

services:
  akshare-service:
    build:
      context: ..          # 以项目根目录为构建上下文
      dockerfile: service/Dockerfile
    image: akshare-stock-service:latest
    container_name: akshare-stock-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
